name: Build DSP Plugin

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # allows manual trigger from GitHub web UI

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]  # PotPlayer is 64-bit on modern systems

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake (x64)
        run: |
          cd dsp_plugin
          cmake -B build -A x64

      - name: Build (Release)
        run: |
          cd dsp_plugin
          cmake --build build --config Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsp_whisper-x64
          path: dsp_plugin/build/Release/dsp_whisper.dll
          if-no-files-found: error
